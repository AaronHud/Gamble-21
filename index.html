<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Royale</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <nav id="hotbar">
            <button onclick="switchGame('blackjack')">Blackjack</button>
            <button onclick="switchGame('roulette')">Roulette</button>
            <button onclick="switchGame('slots')">Slots</button>
        </nav>

        <div id="wallet">Balance: $<span id="balance">1000</span></div>

        <div id="main-game-area">
            <h2>Welcome to the Casino!</h2>
            <p>Select a game above to start playing.</p>
        </div>

        <div id="history-section">
            <h3>Recent Activity</h3>
            <ul id="history-log"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
